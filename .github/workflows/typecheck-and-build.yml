name: Typecheck and Build

on:
  push:
    branches:
      - main
      - testnet
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 19
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Build Project
        run: yarn build
